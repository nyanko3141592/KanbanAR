<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>卒業式AR看板カメラ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <style>
    :root {
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Noto Sans JP', system-ui, sans-serif;
      background: #000; overflow: hidden;
      touch-action: none;
      -webkit-user-select: none; user-select: none;
      height: 100dvh; width: 100vw; position: fixed;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes toast {
      0% { opacity: 0; transform: translate(-50%, 10px); }
      15%,85% { opacity: 1; transform: translate(-50%, 0); }
      100% { opacity: 0; transform: translate(-50%, -10px); }
    }
    @keyframes pulse-ring {
      0% { transform: translate(-50%,-50%) scale(0.8); opacity: 0.6; }
      100% { transform: translate(-50%,-50%) scale(1.6); opacity: 0; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(100%); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ━━ Setup ━━ */
    #setup-screen {
      position: fixed; inset: 0; background: #0a0a0a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100; padding: 32px 24px; overflow-y: auto;
    }
    .setup-content {
      display: flex; flex-direction: column;
      align-items: center; gap: 28px;
      max-width: 380px; width: 100%;
      animation: fadeUp 0.6s ease-out;
    }
    .logo-area { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .logo-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3);
    }
    .logo-area h1 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
    .logo-area p { font-size: 14px; color: #71717a; text-align: center; line-height: 1.5; }
    .input-group { width: 100%; display: flex; flex-direction: column; gap: 8px; }
    .input-group label { font-size: 13px; font-weight: 500; color: #a1a1aa; padding-left: 4px; }
    .input-group input {
      font-family: 'Noto Sans JP', system-ui, sans-serif;
      font-size: 17px; font-weight: 500; padding: 16px 20px;
      border: 1.5px solid #27272a; border-radius: 14px;
      background: #18181b; color: #fff; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-group input::placeholder { color: #52525b; }
    .input-group input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    .style-picker { display: flex; gap: 10px; justify-content: center; width: 100%; }
    .style-chip {
      flex: 1; max-width: 72px; padding: 10px 0;
      border: 1.5px solid #27272a; border-radius: 12px;
      background: #18181b; color: #a1a1aa;
      font-family: 'Noto Sans JP', system-ui, sans-serif;
      font-size: 13px; font-weight: 500; cursor: pointer; text-align: center;
      transition: all 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .style-chip .dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); }
    .style-chip.active { border-color: #6366f1; background: rgba(99,102,241,0.1); color: #e4e4e7; }
    #start-btn {
      width: 100%;
      font-family: 'Noto Sans JP', system-ui, sans-serif;
      font-size: 17px; font-weight: 700; padding: 16px 24px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; border: none; border-radius: 14px; cursor: pointer;
      box-shadow: 0 4px 24px rgba(99,102,241,0.3);
      transition: transform 0.15s; position: relative; overflow: hidden;
    }
    #start-btn::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 30%, rgba(255,255,255,0.12) 50%, transparent 70%);
      background-size: 200% 100%; animation: shimmer 3s infinite;
    }
    #start-btn:active { transform: scale(0.97); }
    .ar-note {
      font-size: 12px; color: #52525b; text-align: center; line-height: 1.6;
    }
    .ar-note strong { color: #a1a1aa; }

    /* ━━ AR Screen ━━ */
    #ar-screen { display: none; position: fixed; inset: 0; }
    #ar-canvas { width: 100%; height: 100%; display: block; }

    /* ━━ Reticle hint ━━ */
    #reticle-hint {
      position: fixed; top: calc(var(--safe-top) + 80px);
      left: 50%; transform: translateX(-50%);
      padding: 10px 22px; border-radius: 100px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      color: #e4e4e7; font-size: 14px; font-weight: 500;
      z-index: 20; pointer-events: none;
      transition: opacity 0.4s;
    }
    #reticle-hint.hidden { opacity: 0; }

    /* ━━ Controls ━━ */
    #ar-controls {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px 24px;
      padding-bottom: calc(var(--safe-bottom) + 20px);
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      z-index: 10;
    }
    #shutter-row {
      display: flex; align-items: center; justify-content: center;
      gap: 32px; width: 100%;
    }
    #shutter-btn {
      width: 76px; height: 76px; border-radius: 50%;
      background: #fff; border: none; cursor: pointer; position: relative;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.25), 0 4px 20px rgba(0,0,0,0.4);
      transition: transform 0.12s; flex-shrink: 0;
    }
    #shutter-btn::after {
      content: ''; position: absolute; inset: 3px; border-radius: 50%;
      border: 2.5px solid rgba(0,0,0,0.08);
    }
    #shutter-btn:active { transform: scale(0.88); }
    .ctrl-btn {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s; flex-shrink: 0;
    }
    .ctrl-btn:active { transform: scale(0.9); }
    .ctrl-btn svg {
      width: 22px; height: 22px; fill: none; stroke: #fff;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    #top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; padding-top: calc(var(--safe-top) + 12px);
      z-index: 10;
    }
    .icon-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff; font-size: 18px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: transform 0.15s;
    }
    .icon-btn:active { transform: scale(0.9); }
    .icon-btn svg {
      width: 20px; height: 20px; fill: none; stroke: #fff;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ━━ Flash ━━ */
    #flash {
      position: fixed; inset: 0; background: #fff; opacity: 0;
      pointer-events: none; z-index: 50; transition: opacity 0.15s;
    }
    #flash.active { opacity: 0.8; transition: none; }

    /* ━━ Toast ━━ */
    .toast {
      position: fixed; bottom: calc(var(--safe-bottom) + 140px);
      left: 50%; transform: translateX(-50%);
      padding: 10px 20px; border-radius: 100px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.06);
      color: #e4e4e7; font-size: 13px; font-weight: 500;
      white-space: nowrap; z-index: 60;
      animation: toast 3s ease-in-out forwards;
      pointer-events: none;
    }

    /* ━━ Preview ━━ */
    #preview-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.95); z-index: 80;
      flex-direction: column; align-items: center; justify-content: flex-end;
      padding: 20px; padding-bottom: calc(var(--safe-bottom) + 24px);
    }
    #preview-modal.show { display: flex; }
    #preview-img {
      max-width: 100%; max-height: 65dvh;
      border-radius: 16px; object-fit: contain;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -55%);
    }
    #preview-actions {
      display: flex; gap: 12px; width: 100%;
      animation: slideIn 0.3s ease-out;
    }
    #preview-actions button {
      flex: 1;
      font-family: 'Noto Sans JP', system-ui, sans-serif;
      font-size: 16px; font-weight: 700; padding: 16px 0;
      border: none; border-radius: 14px; cursor: pointer;
      transition: transform 0.15s;
    }
    #preview-actions button:active { transform: scale(0.97); }
    #close-preview-btn { background: #27272a; color: #e4e4e7; }
    #save-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
      box-shadow: 0 4px 20px rgba(99,102,241,0.3);
    }
    #share-btn {
      background: #059669; color: #fff; display: none;
      box-shadow: 0 4px 20px rgba(5,150,105,0.25);
    }

    /* ━━ Fallback (non-AR) ━━ */
    #fallback-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
      display: none;
    }
    #no-ar-banner {
      display: none;
      position: fixed; top: calc(var(--safe-top) + 12px);
      left: 50%; transform: translateX(-50%);
      padding: 8px 18px; border-radius: 100px;
      background: rgba(234, 179, 8, 0.2);
      border: 1px solid rgba(234, 179, 8, 0.3);
      color: #fbbf24; font-size: 12px; font-weight: 500;
      z-index: 20; white-space: nowrap;
    }
  </style>
</head>
<body>

  <!-- Setup -->
  <div id="setup-screen">
    <div class="setup-content">
      <div class="logo-area">
        <div class="logo-icon">🎓</div>
        <h1>卒業式AR看板カメラ</h1>
        <p>現実の地面や床にAR立て看板を設置<br>そのまま記念写真を撮影できます</p>
      </div>
      <div class="input-group">
        <label>大学名・学校名</label>
        <input id="uni-name" type="text" placeholder="例：東京大学" autocomplete="off" enterkeyhint="go">
      </div>
      <div class="input-group">
        <label>看板スタイル</label>
        <div class="style-picker" id="style-picker"></div>
      </div>
      <button id="start-btn">ARカメラを起動する</button>
      <p class="ar-note">
        <strong>Android Chrome</strong>推奨（WebXR対応）<br>
        非対応ブラウザではカメラモードで動作します
      </p>
    </div>
  </div>

  <!-- AR Screen -->
  <div id="ar-screen">
    <video id="fallback-video" autoplay playsinline muted></video>
    <canvas id="ar-canvas"></canvas>
    <div id="no-ar-banner">ARモード非対応 — カメラモードで動作中</div>

    <div id="reticle-hint">平面を検出中… スマホをゆっくり動かしてください</div>

    <div id="top-bar">
      <button class="icon-btn" id="back-btn">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div style="display:flex;gap:10px">
        <button class="icon-btn" id="style-btn">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
      </div>
    </div>

    <div id="ar-controls">
      <div id="shutter-row">
        <button class="ctrl-btn" id="reset-btn" title="リセット">
          <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        <button id="shutter-btn"></button>
        <button class="ctrl-btn" id="scale-btn" title="サイズ切替">
          <svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div id="flash"></div>

  <!-- Preview -->
  <div id="preview-modal">
    <img id="preview-img">
    <div id="preview-actions">
      <button id="close-preview-btn">閉じる</button>
      <button id="share-btn">共有</button>
      <button id="save-btn">保存</button>
    </div>
  </div>

<script type="module">
import * as THREE from 'three';

const $ = id => document.getElementById(id);

// ── Config ──
let universityName = '';
let styleIndex = 0;
let kanbanGroup = null;
let placed = false;
let arMode = false;
let scaleLevel = 1; // 0=small, 1=medium, 2=large
const scaleSizes = [0.6, 1.0, 1.5];

const styles = [
  { bg: '#7A1B1B', border: '#D4AF37', text: '#FFF5E0', accent: '#D4AF37', label: '紅', dot: '#8B0000' },
  { bg: '#152B4F', border: '#94A3B8', text: '#E2E8F0', accent: '#7DD3FC', label: '紺', dot: '#1B3A5C' },
  { bg: '#2E1A47', border: '#C084FC', text: '#F3E8FF', accent: '#C084FC', label: '紫', dot: '#2E1A47' },
  { bg: '#0F3D2C', border: '#86EFAC', text: '#ECFDF5', accent: '#86EFAC', label: '翠', dot: '#0D3B2E' },
  { bg: '#1C1917', border: '#D6D3D1', text: '#FAFAF9', accent: '#A8A29E', label: '墨', dot: '#1C1917' },
];

// ── Build style chips ──
const picker = $('style-picker');
styles.forEach((s, i) => {
  const chip = document.createElement('button');
  chip.className = 'style-chip' + (i === 0 ? ' active' : '');
  chip.innerHTML = `<span class="dot" style="background:${s.dot}"></span>${s.label}`;
  chip.addEventListener('click', () => {
    styleIndex = i;
    picker.querySelectorAll('.style-chip').forEach((c, j) => c.classList.toggle('active', j === i));
  });
  picker.appendChild(chip);
});

// ── Three.js globals ──
let renderer, scene, camera;
let xrSession = null;
let xrRefSpace = null;
let xrHitTestSource = null;
let reticle = null;
let fallbackStream = null;

// ── Setup events ──
$('start-btn').addEventListener('click', startAR);
$('uni-name').addEventListener('keydown', e => { if (e.key === 'Enter') startAR(); });

async function startAR() {
  universityName = $('uni-name').value.trim() || '○○大学';
  $('setup-screen').style.display = 'none';
  $('ar-screen').style.display = 'block';

  initThree();

  // Try WebXR
  if (navigator.xr) {
    try {
      const supported = await navigator.xr.isSessionSupported('immersive-ar');
      if (supported) {
        await startWebXR();
        return;
      }
    } catch {}
  }

  // Fallback: camera + 3D overlay
  startFallbackMode();
}

function initThree() {
  const canvas = $('ar-canvas');
  renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);

  // Lighting
  const ambient = new THREE.AmbientLight(0xffffff, 0.7);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
  dirLight.position.set(2, 5, 3);
  dirLight.castShadow = true;
  scene.add(dirLight);
  const hemi = new THREE.HemisphereLight(0xffeedd, 0x444466, 0.4);
  scene.add(hemi);

  // Reticle (ring on detected plane)
  const ringGeo = new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI / 2);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x6366f1, transparent: true, opacity: 0.7 });
  reticle = new THREE.Mesh(ringGeo, ringMat);
  reticle.visible = false;
  scene.add(reticle);
}

// ━━ WebXR Mode ━━
async function startWebXR() {
  arMode = true;
  renderer.xr.enabled = true;

  xrSession = await navigator.xr.requestSession('immersive-ar', {
    requiredFeatures: ['hit-test'],
    optionalFeatures: ['dom-overlay'],
    domOverlay: { root: $('ar-screen') }
  });

  renderer.xr.setReferenceSpaceType('local');
  await renderer.xr.setSession(xrSession);

  xrRefSpace = await xrSession.requestReferenceSpace('local');
  const viewerSpace = await xrSession.requestReferenceSpace('viewer');
  xrHitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });

  xrSession.addEventListener('end', () => {
    arMode = false;
    xrSession = null;
    xrHitTestSource = null;
  });

  // Tap to place
  xrSession.addEventListener('select', onXRSelect);

  renderer.setAnimationLoop(onXRFrame);
}

function onXRSelect() {
  if (reticle.visible && !placed) {
    placeKanban(reticle.position.clone(), reticle.quaternion.clone());
    placed = true;
    $('reticle-hint').classList.add('hidden');
    showToast('看板を設置しました！ タップで再配置');
  } else if (reticle.visible && placed) {
    // Reposition
    kanbanGroup.position.copy(reticle.position);
    const euler = new THREE.Euler().setFromQuaternion(reticle.quaternion);
    kanbanGroup.rotation.y = euler.y;
    haptic();
  }
}

function onXRFrame(time, frame) {
  if (!xrHitTestSource || !frame) return;

  const results = frame.getHitTestResults(xrHitTestSource);
  if (results.length > 0) {
    const hit = results[0];
    const pose = hit.getPose(xrRefSpace);
    if (pose) {
      reticle.visible = true;
      reticle.matrix.fromArray(pose.transform.matrix);
      reticle.matrix.decompose(reticle.position, reticle.quaternion, reticle.scale);

      if (!placed) {
        $('reticle-hint').textContent = 'タップして看板を設置';
      }
    }
  } else {
    if (!placed) {
      reticle.visible = false;
      $('reticle-hint').textContent = '平面を検出中… ゆっくり動かしてください';
    }
  }

  renderer.render(scene, camera);
}

// ━━ Fallback (non-AR) ━━
async function startFallbackMode() {
  arMode = false;
  $('no-ar-banner').style.display = 'block';
  $('reticle-hint').classList.add('hidden');

  try {
    fallbackStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    const video = $('fallback-video');
    video.srcObject = fallbackStream;
    video.style.display = 'block';
  } catch {
    showToast('カメラにアクセスできません');
  }

  camera.position.set(0, 1.2, 2.5);
  camera.lookAt(0, 0.6, 0);
  renderer.setClearColor(0x000000, 0);

  placeKanban(new THREE.Vector3(0, 0, 0), new THREE.Quaternion());
  placed = true;

  // Touch to rotate / pinch to scale in fallback
  let lastTouch = null;
  let lastPinchDist = 0;
  const canvas = $('ar-canvas');

  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) lastTouch = e.touches[0].clientX;
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      lastPinchDist = Math.sqrt(dx*dx + dy*dy);
    }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && lastTouch !== null && kanbanGroup) {
      const dx = e.touches[0].clientX - lastTouch;
      kanbanGroup.rotation.y += dx * 0.008;
      lastTouch = e.touches[0].clientX;
    }
    if (e.touches.length === 2 && kanbanGroup) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (lastPinchDist > 0) {
        const delta = (dist - lastPinchDist) * 0.005;
        const s = kanbanGroup.scale.x;
        const ns = Math.max(0.3, Math.min(2.5, s + delta));
        kanbanGroup.scale.setScalar(ns);
      }
      lastPinchDist = dist;
    }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    if (e.touches.length < 2) lastPinchDist = 0;
    if (e.touches.length < 1) lastTouch = null;
  });

  // Mouse drag
  let mouseDown = false;
  canvas.addEventListener('mousedown', () => { mouseDown = true; });
  window.addEventListener('mouseup', () => { mouseDown = false; });
  window.addEventListener('mousemove', e => {
    if (mouseDown && kanbanGroup) kanbanGroup.rotation.y += e.movementX * 0.008;
  });
  canvas.addEventListener('wheel', e => {
    if (!kanbanGroup) return;
    const s = kanbanGroup.scale.x;
    kanbanGroup.scale.setScalar(Math.max(0.3, Math.min(2.5, s - e.deltaY * 0.002)));
    e.preventDefault();
  }, { passive: false });

  function fallbackLoop() {
    renderer.render(scene, camera);
    requestAnimationFrame(fallbackLoop);
  }
  fallbackLoop();
}

// ━━ Build 3D Standing Signboard ━━
function placeKanban(position, quaternion) {
  if (kanbanGroup) scene.remove(kanbanGroup);
  kanbanGroup = new THREE.Group();

  const s = scaleSizes[scaleLevel];

  // Board dimensions (meters)
  const boardW = 1.2 * s;
  const boardH = 0.8 * s;
  const boardD = 0.025 * s;
  const legH = 0.5 * s;
  const legR = 0.018 * s;

  // ── Board (box with rounded feel) ──
  const boardGeo = new THREE.BoxGeometry(boardW, boardH, boardD, 1, 1, 1);
  const boardTexture = createBoardTexture();

  const boardMats = [
    new THREE.MeshStandardMaterial({ color: 0x5C3A1E, roughness: 0.7 }), // right
    new THREE.MeshStandardMaterial({ color: 0x5C3A1E, roughness: 0.7 }), // left
    new THREE.MeshStandardMaterial({ color: 0x5C3A1E, roughness: 0.7 }), // top
    new THREE.MeshStandardMaterial({ color: 0x5C3A1E, roughness: 0.7 }), // bottom
    new THREE.MeshStandardMaterial({ map: boardTexture, roughness: 0.35, metalness: 0.05 }), // front
    new THREE.MeshStandardMaterial({ color: 0x6B4226, roughness: 0.8 }), // back
  ];

  const board = new THREE.Mesh(boardGeo, boardMats);
  board.position.y = legH + boardH / 2;
  board.castShadow = true;
  kanbanGroup.add(board);

  // ── Wooden frame around the board ──
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.5, metalness: 0.15 });
  const frameW = 0.03 * s;

  // Top frame
  const topFrame = new THREE.Mesh(new THREE.BoxGeometry(boardW + frameW * 2, frameW, boardD + 0.01), frameMat);
  topFrame.position.y = legH + boardH + frameW / 2;
  kanbanGroup.add(topFrame);

  // Bottom frame
  const botFrame = topFrame.clone();
  botFrame.position.y = legH - frameW / 2;
  kanbanGroup.add(botFrame);

  // Left frame
  const sideFrame = new THREE.Mesh(new THREE.BoxGeometry(frameW, boardH + frameW * 2, boardD + 0.01), frameMat);
  sideFrame.position.set(-boardW / 2 - frameW / 2, legH + boardH / 2, 0);
  kanbanGroup.add(sideFrame);

  // Right frame
  const rightFrame = sideFrame.clone();
  rightFrame.position.x = boardW / 2 + frameW / 2;
  kanbanGroup.add(rightFrame);

  // ── Legs (A-frame easel) ──
  const legMat = new THREE.MeshStandardMaterial({ color: 0x6B4226, roughness: 0.6 });

  // Front left leg
  const legGeo = new THREE.CylinderGeometry(legR, legR * 1.1, legH + 0.05, 8);
  const legFL = new THREE.Mesh(legGeo, legMat);
  legFL.position.set(-boardW * 0.35, legH / 2 - 0.025, boardD / 2);
  legFL.castShadow = true;
  kanbanGroup.add(legFL);

  // Front right leg
  const legFR = legFL.clone();
  legFR.position.x = boardW * 0.35;
  kanbanGroup.add(legFR);

  // Back support leg (angled)
  const backLegLen = legH * 1.1;
  const backLeg = new THREE.Mesh(
    new THREE.CylinderGeometry(legR * 0.8, legR * 1.0, backLegLen, 8),
    legMat
  );
  backLeg.position.set(0, backLegLen / 2 * Math.cos(0.35) - 0.02, -backLegLen / 2 * Math.sin(0.35) - boardD / 2);
  backLeg.rotation.x = 0.35;
  backLeg.castShadow = true;
  kanbanGroup.add(backLeg);

  // ── Place in scene ──
  kanbanGroup.position.copy(position);
  if (arMode) {
    const euler = new THREE.Euler().setFromQuaternion(quaternion);
    kanbanGroup.rotation.y = euler.y;
  }

  scene.add(kanbanGroup);
  haptic();
}

// ━━ Board Texture (Canvas 2D → Three.js Texture) ━━
function createBoardTexture() {
  const w = 1024, h = 680;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  const s = styles[styleIndex];
  const serif = "'Noto Serif JP', 'Hiragino Mincho ProN', serif";

  // Background
  ctx.fillStyle = s.bg;
  ctx.fillRect(0, 0, w, h);

  // Subtle texture
  ctx.globalAlpha = 0.03;
  for (let i = 0; i < h; i += 2) {
    ctx.fillStyle = i % 4 === 0 ? '#fff' : '#000';
    ctx.fillRect(0, i, w, 1);
  }
  ctx.globalAlpha = 1;

  // Inner border
  const m = 28;
  ctx.strokeStyle = s.border;
  ctx.lineWidth = 3;
  ctx.globalAlpha = 0.5;
  ctx.strokeRect(m, m, w - m * 2, h - m * 2);
  ctx.globalAlpha = 1;

  // Year
  const year = new Date().getFullYear();
  const reiwa = year - 2018;
  ctx.font = `500 32px ${serif}`;
  ctx.fillStyle = s.accent;
  ctx.textAlign = 'center';
  ctx.globalAlpha = 0.85;
  ctx.fillText(`令和${reiwa}年度`, w / 2, 100);
  ctx.globalAlpha = 1;

  // Main title
  ctx.font = `bold 72px ${serif}`;
  ctx.fillStyle = s.text;
  ctx.fillText('卒業証書授与式', w / 2, h * 0.44);

  // University
  ctx.font = `700 52px ${serif}`;
  ctx.fillText(universityName, w / 2, h * 0.62);

  // Decorative line
  const grad = ctx.createLinearGradient(w * 0.3, 0, w * 0.7, 0);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(0.15, s.accent);
  grad.addColorStop(0.85, s.accent);
  grad.addColorStop(1, 'transparent');
  ctx.strokeStyle = grad;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(w * 0.3, h * 0.72);
  ctx.lineTo(w * 0.7, h * 0.72);
  ctx.stroke();

  // Date
  const now = new Date();
  ctx.font = `400 28px ${serif}`;
  ctx.fillStyle = s.accent;
  ctx.globalAlpha = 0.75;
  ctx.fillText(`${year}年${now.getMonth()+1}月${now.getDate()}日`, w / 2, h * 0.84);
  ctx.globalAlpha = 1;

  // Corner ornaments
  drawCanvasOrnament(ctx, m + 18, m + 18, 12, s.accent);
  drawCanvasOrnament(ctx, w - m - 18, m + 18, 12, s.accent);
  drawCanvasOrnament(ctx, m + 18, h - m - 18, 12, s.accent);
  drawCanvasOrnament(ctx, w - m - 18, h - m - 18, 12, s.accent);

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function drawCanvasOrnament(ctx, x, y, r, color) {
  ctx.save();
  ctx.globalAlpha = 0.45;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x, y - r); ctx.lineTo(x + r, y);
  ctx.lineTo(x, y + r); ctx.lineTo(x - r, y);
  ctx.closePath();
  ctx.stroke();
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.arc(x, y, r * 0.25, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ━━ Controls ━━

$('back-btn').addEventListener('click', () => {
  if (xrSession) xrSession.end();
  if (fallbackStream) fallbackStream.getTracks().forEach(t => t.stop());
  $('ar-screen').style.display = 'none';
  $('setup-screen').style.display = 'flex';
  placed = false;
  if (kanbanGroup) { scene.remove(kanbanGroup); kanbanGroup = null; }
});

$('style-btn').addEventListener('click', () => {
  styleIndex = (styleIndex + 1) % styles.length;
  showToast(`スタイル：${styles[styleIndex].label}`);
  if (placed && kanbanGroup) {
    // Rebuild texture
    const board = kanbanGroup.children[0];
    if (board && board.material) {
      const newTex = createBoardTexture();
      board.material[4].map = newTex;
      board.material[4].needsUpdate = true;
    }
  }
  haptic();
});

$('reset-btn').addEventListener('click', () => {
  if (kanbanGroup) {
    if (!arMode) {
      kanbanGroup.rotation.y = 0;
      kanbanGroup.scale.setScalar(1);
    }
    showToast('リセットしました');
  }
  haptic();
});

$('scale-btn').addEventListener('click', () => {
  scaleLevel = (scaleLevel + 1) % scaleSizes.length;
  const labels = ['小', '中', '大'];
  showToast(`サイズ：${labels[scaleLevel]}`);
  if (placed && kanbanGroup) {
    const pos = kanbanGroup.position.clone();
    const rot = kanbanGroup.rotation.y;
    placeKanban(pos, new THREE.Quaternion());
    kanbanGroup.rotation.y = rot;
  }
  haptic();
});

// ━━ Shutter ━━
$('shutter-btn').addEventListener('click', capturePhoto);

function capturePhoto() {
  haptic();
  const flash = $('flash');
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 180);

  // Render one clean frame
  renderer.render(scene, camera);

  const arCanvas = $('ar-canvas');
  const captureCanvas = document.createElement('canvas');
  captureCanvas.width = arCanvas.width;
  captureCanvas.height = arCanvas.height;
  const cctx = captureCanvas.getContext('2d');

  // For fallback mode, draw video first
  if (!arMode) {
    const video = $('fallback-video');
    cctx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
  }

  // Draw 3D scene on top
  cctx.drawImage(arCanvas, 0, 0);

  const dataUrl = captureCanvas.toDataURL('image/jpeg', 0.95);
  $('preview-img').src = dataUrl;
  $('preview-modal').classList.add('show');
  if (navigator.canShare) $('share-btn').style.display = 'block';
}

// ━━ Preview ━━
$('close-preview-btn').addEventListener('click', () => $('preview-modal').classList.remove('show'));

$('save-btn').addEventListener('click', () => {
  const a = document.createElement('a');
  a.href = $('preview-img').src;
  a.download = `卒業式_${universityName}_${Date.now()}.jpg`;
  a.click();
  showToast('保存しました');
  $('preview-modal').classList.remove('show');
});

$('share-btn').addEventListener('click', async () => {
  try {
    const res = await fetch($('preview-img').src);
    const blob = await res.blob();
    const file = new File([blob], `卒業式_${universityName}.jpg`, { type: 'image/jpeg' });
    await navigator.share({ files: [file], title: `${universityName} 卒業式` });
    $('preview-modal').classList.remove('show');
  } catch {}
});

// ━━ Utils ━━
function haptic() { if (navigator.vibrate) navigator.vibrate(10); }

function showToast(text) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// Resize
window.addEventListener('resize', () => {
  if (!renderer) return;
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
